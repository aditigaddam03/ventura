<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Page Not Found — LaunchKit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f5f7ff;
      background:
        radial-gradient(circle at top left, rgba(124, 140, 255, 0.26), transparent 30%),
        radial-gradient(circle at 85% 15%, rgba(57, 208, 255, 0.18), transparent 22%),
        linear-gradient(180deg, #09101f 0%, #070d19 100%);
    }

    main {
      width: min(100%, 620px);
      padding: 32px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(15, 24, 48, 0.76);
      box-shadow: 0 30px 80px rgba(2, 8, 22, 0.45);
      backdrop-filter: blur(16px);
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: #39d0ff;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 7vw, 4rem);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    p {
      margin: 16px auto 0;
      max-width: 34ch;
      color: #a9b5d1;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0.85rem 1.35rem;
      margin-top: 28px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, #7c8cff 0%, #9f6bff 100%);
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 18px 34px rgba(124, 140, 255, 0.3);
    }
  </style>
</head>

<body>
  <main>
    <p class="eyebrow">404 Error</p>
    <h1>That page drifted off course.</h1>
    <p>The page you requested does not exist or may have moved. Head back to the landing page and continue from there.</p>
    <a href="./">Return home</a>
  </main>
</body>

</html>
<!-- IE needs 512+ bytes: https://docs.microsoft.com/archive/blogs/ieinternals/friendly-http-error-pages -->
